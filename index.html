<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê Cầu Thủ Bóng Đá</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9; /* Màu nền sáng */
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333; /* Màu chữ tối */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        th, td {
            border: 1px solid #ccc; /* Màu viền nhẹ */
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #4CAF50; /* Màu xanh lá cây cho tiêu đề */
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2; /* Màu nền cho hàng chẵn */
        }
        button {
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .win {
            background-color: #4CAF50; /* Màu xanh lá cây cho thắng */
        }
        .loss {
            background-color: #f44336; /* Màu đỏ cho thua */
        }
        .draw {
            background-color: #ffeb3b; /* Màu vàng cho hòa */
            color: black; /* Chữ màu đen cho dễ đọc */
        }
        .reset {
            background-color: #2196F3; /* Màu xanh dương cho reset */
            color: white;
        }
        .update {
            background-color: #ff9800; /* Màu cam cho cập nhật tên */
        }
        button:hover {
            opacity: 0.9; /* Hiệu ứng mờ khi hover */
        }
    </style>
</head>
<body>

<h1>THỐNG KÊ</h1>
<table id="playerTable">
    <thead>
        <tr>
            <th>TÊN CẦU THỦ</th>
            <th>THẮNG</th>
            <th>THUA</th>
            <th>HÒA</th>
            <th>% THẮNG</th>
            <th>% THUA</th>
            <th>% HÒA</th>
            <th>THAO TÁC</th>
        </tr>
    </thead>
    <tbody>
        <!-- Dữ liệu cầu thủ sẽ được thêm vào đây -->
    </tbody>
</table>

<button class="reset" onclick="resetData()">Reset</button>

<script>
    const defaultPlayers = [
    { name: "Khương", wins: 0, losses: 0, draws: 0 },
    { name: "Lâm", wins: 0, losses: 0, draws: 0 },
    { name: "Tuyên", wins: 0, losses: 0, draws: 0 },
    { name: "Tiến", wins: 0, losses: 0, draws: 0 },
    { name: "Trung đập choai", wins: 0, losses: 0, draws: 0 },
    { name: "Tưởng", wins: 0, losses: 0, draws: 0 },
    { name: "Thành", wins: 0, losses: 0, draws: 0 },
    { name: "Lewandowski", wins: 0, losses: 0, draws: 0 },
    { name: "Sadio Mane", wins: 0, losses: 0, draws: 0 },
    { name: "Harry Kane", wins: 0, losses: 0, draws: 0 },
    { name: "Ronaldo", wins: 0, losses: 0, draws: 0 },
	// Cách thay đổi tên cầu thủ trong mã nguồn: F12 - Console - Xóa dữ liệu trong localStorage: localStorage.removeItem('players');
    ];

    let players = JSON.parse(localStorage.getItem('players')) || defaultPlayers;

    function updateTable() {
        const tbody = document.querySelector("#playerTable tbody");
        tbody.innerHTML = "";
        players.forEach((player, index) => {
            const winRate = ((player.wins / (player.wins + player.losses + player.draws)) * 100 || 0).toFixed(2);
            const lossRate = ((player.losses / (player.wins + player.losses + player.draws)) * 100 || 0).toFixed(2);
            const drawRate = ((player.draws / (player.wins + player.losses + player.draws)) * 100 || 0).toFixed(2);
            tbody.innerHTML += `
                <tr>
                    <td>${player.name}</td>
                    <td>${player.wins}</td>
                    <td>${player.losses}</td>
                    <td>${player.draws}</td>
                    <td>${winRate}%</td>
                    <td>${lossRate}%</td>
                    <td>${drawRate}%</td>
                    <td>
                        <button class="win" onclick="updateStats(${index}, 'win')">Thắng</button>
                        <button class="loss" onclick="updateStats(${index}, 'loss')">Thua</button>
                        <button class="draw" onclick="updateStats(${index}, 'draw')">Hòa</button>
                    </td>
                </tr>
            `;
        });
    }

    function updateStats(index, result) {
        if (result === 'win') {
            players[index].wins++;
        } else if (result === 'loss') {
            players[index].losses++;
        } else if (result === 'draw') {
            players[index].draws++;
        }
        saveData();
        updateTable();
    }

    function resetData() {
        players.forEach(player => {
            player.wins = 0;
            player.losses = 0;
            player.draws = 0;
        });
        saveData();
        updateTable();
    }

    function saveData() {
        localStorage.setItem('players', JSON.stringify(players));
    }

    // Khởi động bảng khi trang được tải
    document.addEventListener("DOMContentLoaded", updateTable);
</script>

</body>
</html>
